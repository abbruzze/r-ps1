name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # 🔧 Linux dependencies
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config zip

      # 🏷️ Read version from Cargo.toml (Linux)
      - name: Get version (Linux)
        if: matrix.os == 'ubuntu-latest'
        id: version_linux
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      # 🏷️ Read version from Cargo.toml (Windows)
      - name: Get version (Windows)
        if: matrix.os == 'windows-latest'
        id: version_windows
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          echo "value=$version" >> $env:GITHUB_OUTPUT

      # 📦 Build
      - name: Build
        run: cargo build --profile fast

      # Linux binary stripping
      - name: Strip binary
        if: matrix.os == 'ubuntu-latest'
        run: strip target/fast/r-ps1

      # 📁 Output folder
      - name: Prepare bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir bundle
          cp target/fast/r-ps1 bundle/
          chmod +x bundle/r-ps1
          zip -r r-ps1-${{ steps.version_linux.outputs.value }}-linux.zip bundle

      - name: Prepare bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir bundle
          copy target\fast\r-ps1.exe bundle\
          powershell Compress-Archive -Path bundle\* -DestinationPath r-ps1-${{ steps.version_windows.outputs.value }}-windows.zip

      # 🧪 Artifact (branch only)
      - name: Upload artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: r-ps1-${{ matrix.os }}
          path: |
            *.zip

      # 📝 Changelog
      - name: Generate changelog
        if: github.ref_type == 'tag'
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 🚀 Release (tag only)
      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            r-ps1-linux.zip
            r-ps1-windows.zip