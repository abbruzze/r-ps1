name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # 🔧 Linux dependencies
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config zip

      # 📦 Build
      - name: Build
        run: cargo build --profile fast

      # Linux binary stripping
      - name: Strip binary
        if: matrix.os == 'ubuntu-latest'
        run: strip target/fast/r-ps1

      # 📁 Output folder
      - name: Prepare bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir bundle
          cp target/fast/r-ps1 bundle/
          chmod +x bundle/r-ps1

      - name: Prepare bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir bundle
          copy target\fast\r-ps1.exe bundle\

      # 🧪 Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r-ps1-${{ needs.prepare.outputs.version }}-${{ matrix.os }}
          path: bundle/

  release:
    needs: [prepare, build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
