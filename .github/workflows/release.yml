name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

  release:
    needs: [prepare]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Debug artifacts
        run: find artifacts/ -type f

      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Zip artifacts
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          zip -j artifacts/r-ps1-${VERSION}-linux.zip artifacts/r-ps1-${VERSION}-ubuntu-latest/r-ps1
          zip -j artifacts/r-ps1-${VERSION}-windows.zip artifacts/r-ps1-${VERSION}-windows-latest/r-ps1.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
